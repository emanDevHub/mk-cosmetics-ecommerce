<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - MK-Cosmetics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fef6f0;
    }
    .is-invalid {
      border: 2px solid red;
    }
    .card {
      background-color: #fff;
      border-radius: 12px;
      padding: 20px;
    }
    #discard-btn {
      margin-top: 20px;
    }
  </style>
</head>
<link rel="icon" type="image/x-icon" href="fav.jpg">
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="height: 80px;">
      <div class="container">
        <a class="navbar-brand" href="#"><img src="logoo.webp" alt="Logo" height="50"></a>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Deals</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container mt-5">
    <h2 class="mb-4">Your Cart Summary</h2>
    <ul id="cart-items" class="list-group mb-4"></ul>
    <h4>Total: Rs. <span id="total-price">0</span></h4>

    <!-- Discard Cart Button -->
    <button id="discard-btn" class="btn btn-danger">🗑️ Discard Cart</button>

    <div class="card mt-4">
      <h4>Place Your Order</h4>
      <form id="order-form" class="mt-3" method="POST" action="cart.php">
        <div class="mb-3">
          <label for="email" class="form-label">Email address *</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password *</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
        </div>
        <div class="mb-3">
          <label for="address" class="form-label">Shipping Address *</label>
          <textarea class="form-control" id="address" name="address" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-success">Place Order</button>
      </form>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">&copy; 2025 MK-Cosmetics. All rights reserved.</p>
  </footer>

  <script>
    const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
    const cartList = document.getElementById('cart-items');
    const totalPriceEl = document.getElementById('total-price');
    const cartCountEl = document.getElementById('cart-count');

    let total = 0;
    cartItems.forEach(item => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';
      li.textContent = item.name;
      const priceSpan = document.createElement('span');
      priceSpan.textContent = `Rs. ${item.price}`;
      li.appendChild(priceSpan);
      cartList.appendChild(li);
      total += item.price;
    });

    totalPriceEl.textContent = total;
    cartCountEl.textContent = cartItems.length;

    // Discard Cart Button Logic
    document.getElementById('discard-btn').addEventListener('click', function() {
      const confirmDiscard = confirm("Are you sure you want to discard the entire cart?");
      if (confirmDiscard) {
        localStorage.removeItem('cart');
        alert("🗑️ Cart discarded successfully!");
        location.reload();
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
